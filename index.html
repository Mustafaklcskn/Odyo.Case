<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdyoCase | Cerrahpaşa</title>
    
    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <h2><i class="fas fa-ear-listen" style="margin-right:10px;"></i>OdyoCase</h2>
        <div>
            <a id="admin-btn" href="/admin.html" style="display:none;">
                <i class="fas fa-screwdriver-wrench"></i> Admin
            </a>
            
            <a href="/profil.html" class="nav-profil">
                <i class="fas fa-user-circle"></i> Profilim
            </a>
            
            <button onclick="cikisYap()" class="nav-cikis">
                <i class="fas fa-sign-out-alt"></i> Çıkış
            </button>
        </div>
    </nav>

    <div id="sayac-kutusu" style="position:fixed; top:90px; right:30px; padding:10px 20px; border-radius:50px; font-weight:bold; font-size:1.5rem; display:none; z-index:999;">
        ⏳ <span id="zaman">05:00</span>
    </div>

    <div class="container">

        <div id="liste-ekrani">
            
            <div class="leaderboard-panel card">
                <h2><i class="fas fa-trophy" style="color:var(--accent)"></i> Zirvedekiler (Top 10)</h2>
                <div style="overflow-x: auto;">
                    <table id="liderlik-tablosu">
                        <thead>
                            <tr>
                                <th>Sıra</th>
                                <th>Öğrenci</th>
                                <th>Çözülen</th>
                                <th style="text-align:right;">Puan</th>
                            </tr>
                        </thead>
                        <tbody id="liderlik-body">
                            <tr><td colspan="4">Yükleniyor...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <h3 style="color:var(--text-main); margin: 30px 0 20px 0; font-size: 1.4rem;">
                <i class="fas fa-folder-open" style="color:var(--primary)"></i> Çözülmeyi Bekleyen Vakalar
            </h3>

            <div id="vaka-listesi">
                <p>Vakalar yükleniyor...</p>
            </div>
        </div>

        <div id="detay-ekrani" style="display: none;">
            
            <button onclick="listeyeDon()" class="btn-back-list">
                <i class="fas fa-arrow-left"></i> Listeye Dön
            </button>
            
            <div style="text-align: center;">
                <img id="detay-resim" src="" style="width: 100%; max-height: 400px; object-fit: contain; margin-bottom: 25px; border-radius:12px; display: none;">
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap:10px; margin-bottom:20px;">
                <h2 id="detay-baslik" style="margin:0; font-size:1.8rem; color:var(--primary);">Vaka Başlığı</h2>
                <span id="detay-zorluk" class="zorluk-etiketi">Zorluk</span>
            </div>

            <div class="card" style="background: rgba(0,0,0,0.2); border:none;">
                <p id="detay-icerik" style="font-size: 1.1rem; color: #e2e8f0;"></p>
            </div>
            
            <hr style="margin: 30px 0; border: 0; border-top: 1px solid var(--border-color);">
            
            <h3 style="margin-bottom:15px; color:var(--text-main);"><i class="fas fa-user-md"></i> Klinik Değerlendirmeniz</h3>
            
            <textarea id="rapor-alani" rows="8" placeholder="LÜTFEN DETAYLI YAZIN:
            1. Olası Tanınız nedir?
            2. Hangi testleri uygulamayı düşünüyorsunuz?
            3. Beklenen bulgular nelerdir?"></textarea>
            
            <button id="gonder-butonu">
                <i class="fas fa-paper-plane"></i> Analiz İçin Gönder
            </button>

            <p id="sonuc-mesaji"></p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
