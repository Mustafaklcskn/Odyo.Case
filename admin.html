<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönetim Paneli | OdyoCase</title>
    
    <!-- Ana Stil Dosyası -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Fontlar ve İkonlar -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Admin Paneline Özel Ek Stiller */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* İki sütunlu yapı */
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; } /* Mobilde tek sütuna düş */
        }

        label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
            font-weight: 600;
        }

        /* Gizli Tanı Kutusu - Dikkat çeksin */
        .secret-input {
            border-color: rgba(239, 68, 68, 0.5) !important;
            background: rgba(239, 68, 68, 0.05) !important;
        }
        .secret-input:focus {
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2) !important;
        }

        /* Yönetim Listesi Kartları */
        .admin-case-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .admin-case-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <h2><i class="fas fa-user-shield" style="color:var(--accent);"></i> Yönetim Paneli</h2>
        <a href="/" class="btn-back-list" style="margin:0; border:none; color:white; background:rgba(255,255,255,0.1);">
            <i class="fas fa-home"></i> Siteye Dön
        </a>
    </nav>

    <div class="container">

        <!-- 1. VAKA EKLEME PANELİ -->
        <div class="card">
            <h2 style="margin-top:0; border-bottom:1px solid var(--border-color); padding-bottom:15px; color:var(--primary);">
                <i class="fas fa-plus-circle"></i> Yeni Vaka Oluştur
            </h2>

            <!-- İki Sütunlu Form -->
            <div class="form-grid">
                
                <!-- Sol Sütun -->
                <div>
                    <label><i class="fas fa-heading"></i> Görünen Başlık (Öğrenci Görür)</label>
                    <input type="text" id="vaka-baslik" placeholder="Örn: 45 Yaş, Erkek, Çınlama Şikayeti">
                </div>

                <!-- Sağ Sütun -->
                <div>
                    <label style="color:var(--danger);"><i class="fas fa-eye-slash"></i> Gizli Tanı (Sadece Sistem Bilir)</label>
                    <input type="text" id="vaka-tani" class="secret-input" placeholder="Örn: Otoskleroz. (Tip As, Carhart beklerim)">
                </div>

                <!-- Sol Sütun -->
                <div>
                    <label><i class="fas fa-layer-group"></i> Zorluk Seviyesi</label>
                    <select id="vaka-zorluk">
                        <option value="Kolay">🟢 Kolay (Temel Vaka)</option>
                        <option value="Orta" selected>🟠 Orta (Standart)</option>
                        <option value="Zor">🔴 Zor (Ayırıcı Tanı Gerekli)</option>
                    </select>
                </div>

                <!-- Sağ Sütun -->
                <div>
                    <label><i class="fas fa-image"></i> Odyogram / Görsel</label>
                    <input type="file" id="vaka-resim" accept="image/*">
                </div>

            </div>

            <!-- Tam Genişlik -->
            <div style="margin-top: 20px;">
                <label><i class="fas fa-file-medical-alt"></i> Vaka Hikayesi / Anamnez</label>
                <textarea id="vaka-icerik" rows="6" placeholder="Hastanın şikayeti, öyküsü ve klinik bulgularını buraya girin..."></textarea>
            </div>

            <button onclick="vakaEkle()" class="admin-btn-save">
                <i class="fas fa-save"></i> Vakayı Sisteme Kaydet
            </button>

            <p id="sonuc" style="margin-top: 15px; font-weight: 600; text-align: center; min-height: 20px;"></p>
        </div>


        <!-- 2. MEVCUT VAKALAR LİSTESİ -->
        <div class="card">
            <h2 style="margin-top:0; color:var(--text-main); margin-bottom: 20px;">
                <i class="fas fa-list-ul"></i> Sistemdeki Vakalar
            </h2>
            
            <div id="yonetim-listesi">
                <p>Vakalar yükleniyor...</p>
            </div>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script>
        // Sayfa açılınca listeyi getir
        document.addEventListener("DOMContentLoaded", vakalariListele);

        // --- VAKA EKLEME ---
        async function vakaEkle() {
            const baslik = document.getElementById('vaka-baslik').value;
            const tani = document.getElementById('vaka-tani').value;
            const zorluk = document.getElementById('vaka-zorluk').value;
            const icerik = document.getElementById('vaka-icerik').value;
            const resimDosyasi = document.getElementById('vaka-resim').files[0];
            const sonucKutusu = document.getElementById('sonuc');

            // Basit Doğrulama
            if(!baslik || !tani || !icerik) {
                sonucKutusu.innerText = "⚠️ Lütfen başlık, tanı ve içerik alanlarını doldurun!";
                sonucKutusu.style.color = "var(--accent)";
                return;
            }

            sonucKutusu.innerText = "⏳ Kaydediliyor...";
            sonucKutusu.style.color = "var(--text-muted)";

            // Veriyi Hazırla
            const formData = new FormData();
            formData.append('baslik', baslik);
            formData.append('gizliTani', tani);
            formData.append('zorluk', zorluk);
            formData.append('icerik', icerik);
            if (resimDosyasi) {
                formData.append('vakaResmi', resimDosyasi);
            }

            try {
                const response = await fetch('/admin/add-case', { method: 'POST', body: formData });
                const data = await response.json();
                
                if(data.success) {
                    sonucKutusu.innerHTML = `<i class="fas fa-check-circle"></i> ${data.message}`;
                    sonucKutusu.style.color = "var(--secondary)";
                    
                    // Formu Temizle
                    document.getElementById('vaka-baslik').value = "";
                    document.getElementById('vaka-tani').value = "";
                    document.getElementById('vaka-icerik').value = "";
                    document.getElementById('vaka-resim').value = "";
                    
                    // Listeyi Yenile
                    vakalariListele();
                } else {
                    sonucKutusu.innerText = "Hata: " + data.message;
                    sonucKutusu.style.color = "var(--danger)";
                }
            } catch (error) {
                sonucKutusu.innerText = "Bağlantı hatası!";
                sonucKutusu.style.color = "var(--danger)";
            }
        }

        // --- LİSTELEME ---
        async function vakalariListele() {
            const listeKutusu = document.getElementById('yonetim-listesi');
            try {
                const response = await fetch('/cases');
                const vakalar = await response.json();
                
                listeKutusu.innerHTML = "";

                if (!Array.isArray(vakalar) || vakalar.length === 0) {
                    listeKutusu.innerHTML = "<p style='color:var(--text-muted); text-align:center;'>Sistemde henüz vaka yok.</p>";
                    return;
                }

                // Tersten sırala (En yeni en üstte)
                vakalar.reverse().forEach(vaka => {
                    const div = document.createElement('div');
                    div.className = 'admin-case-item';
                    
                    div.innerHTML = `
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span style="font-weight:bold; color:var(--primary); background:rgba(59,130,246,0.1); padding:5px 10px; border-radius:5px;">#${vaka.vakaNo}</span>
                            <div>
                                <div style="font-weight:600; color:var(--text-main);">${vaka.baslik}</div>
                                <div style="font-size:0.8rem; color:var(--text-muted);">Zorluk: ${vaka.zorluk}</div>
                            </div>
                        </div>
                        <button onclick="vakaSil(${vaka.vakaNo})" class="delete-btn" style="background:rgba(239,68,68,0.2); color:#fca5a5; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; transition:0.2s;">
                            <i class="fas fa-trash-alt"></i> Sil
                        </button>
                    `;
                    listeKutusu.appendChild(div);
                });

            } catch (error) {
                console.error(error);
                listeKutusu.innerHTML = "<p style='color:var(--danger);'>Liste yüklenemedi.</p>";
            }
        }

        // --- SİLME ---
        async function vakaSil(no) {
            if (!confirm(`Vaka ${no} kalıcı olarak silinecek. Emin misiniz?`)) return;
            
            try {
                const response = await fetch('/admin/delete-case/' + no, { method: 'DELETE' });
                const data = await response.json();
                
                if (data.success) {
                    vakalariListele(); // Listeyi tazele
                } else {
                    alert("Hata: " + data.message);
                }
            } catch (error) { 
                alert("Hata oluştu."); 
            }
        }
    </script>
</body>
</html>
