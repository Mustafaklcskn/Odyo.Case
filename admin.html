<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönetim Paneli | OdyoCase</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ADMIN ÖZEL STİLLERİ */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
        
        label { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px; display: block; font-weight: 600; }
        .secret-input { border-color: rgba(239, 68, 68, 0.5) !important; background: rgba(239, 68, 68, 0.05) !important; }
        
        /* TAB BUTONLARI */
        .mode-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: transparent; color: #94a3b8;
            font-weight: 700; cursor: pointer; border-radius: 8px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }

        /* LİSTE ELEMANLARI */
        .admin-case-item { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); 
            padding: 15px; border-radius: 10px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
    </style>
</head>
<body>
    
    <nav class="navbar">
        <a href="/" style="display: flex; align-items: center; text-decoration: none; gap: 0;">
            <svg width="34" height="34" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: -1px;">
                <circle cx="25" cy="25" r="20" stroke="url(#gradO)" stroke-width="7" />
                <path d="M18 22V28" stroke="white" stroke-width="3" stroke-linecap="round"/>
                <path d="M25 17V33" stroke="white" stroke-width="3" stroke-linecap="round"/>
                <path d="M32 22V28" stroke="white" stroke-width="3" stroke-linecap="round"/>
                <defs><linearGradient id="gradO" x1="0" y1="0" x2="50" y2="50" gradientUnits="userSpaceOnUse"><stop stop-color="#3b82f6"/><stop offset="1" stop-color="#1e40af"/></linearGradient></defs>
            </svg>
            <span style="font-size: 1.6rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; line-height: 1;">
                dyo<span style="color: #3b82f6;">Case</span>
            </span>
        </a>

        <div style="display:flex; align-items:center; gap:15px;">
            <span style="color:#94a3b8; font-weight:600; font-size:0.9rem; text-transform: uppercase;">Yönetim Paneli</span>
            <a href="/" style="background:rgba(255,255,255,0.1); color:white; padding:8px 15px; border-radius:8px; text-decoration:none; font-weight:bold; font-size:0.9rem; border:1px solid rgba(255,255,255,0.2); transition:0.2s;">
                <i class="fas fa-home"></i> Siteye Dön
            </a>
        </div>
    </nav>

    <div class="container">
        
        <div class="card">
            <div class="mode-tabs">
                <button class="tab-btn active" onclick="modDegistir('klasik')">
                    <i class="fas fa-folder"></i> Klasik Vaka Ekle
                </button>
                <button class="tab-btn" onclick="modDegistir('simulasyon')">
                    <i class="fas fa-user-md"></i> Klinik Simülasyon Ekle
                </button>
            </div>

            <div class="form-grid">
                <div><label>Vaka Başlığı</label><input type="text" id="genel-baslik" placeholder="Örn: Ani İşitme Kaybı"></div>
                <div><label>Hasta Yaşı</label><input type="number" id="genel-yas" placeholder="45"></div>
                <div><label>Cinsiyet</label><select id="genel-cinsiyet"><option>Erkek</option><option>Kadın</option><option>Çocuk</option></select></div>
                <div><label>Zorluk</label><select id="genel-zorluk"><option>Kolay</option><option selected>Orta</option><option>Zor</option></select></div>
            </div>

            <div id="form-klasik">
                <div class="form-grid" style="margin-top:15px;">
                    <div><label style="color:var(--danger);">Gizli Tanı (AI İçin)</label><input type="text" id="klasik-tani" class="secret-input" placeholder="Gerçek tanı ne?"></div>
                    <div><label>Görsel (Opsiyonel)</label><input type="file" id="klasik-resim"></div>
                </div>
                <div style="margin-top: 15px;">
                    <label>Vaka Hikayesi (Metin)</label>
                    <textarea id="klasik-icerik" rows="5" placeholder="Hastanın şikayetini ve öyküsünü buraya yazın..."></textarea>
                </div>
            </div>

            <div id="form-simulasyon" style="display:none;">
                <div class="form-grid" style="margin-top:15px;">
                    <div><label>Geliş Şikayeti (Görünen)</label><input type="text" id="sim-sikayet" placeholder="Hasta kapıdan girince ne diyor?"></div>
                    <div><label style="color:var(--danger);">Gerçek Tanı</label><input type="text" id="sim-tani" class="secret-input"></div>
                </div>

                <h3 style="margin:20px 0 10px 0; color:var(--primary); border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px;">🔍 Klinik Bulgular (Gizli)</h3>
                
                <div class="form-grid">
                    <div><label>Anamnez Cevabı</label><textarea id="sim-anamnez" rows="2" placeholder="Anamnez alınınca ne desin?"></textarea></div>
                    <div><label>Otoskopi Bulgusu</label><textarea id="sim-otoskopi" rows="2" placeholder="Zar nasıl görünüyor?"></textarea></div>
                    <div><label>Saf Ses Odyometrisi</label><textarea id="sim-safses" rows="2" placeholder="Bulgular (Örn: Sağda 40dB SNİK)"></textarea></div>
                    <div><label>Timpanometri</label><textarea id="sim-timpano" rows="2" placeholder="Örn: Tip A"></textarea></div>
                    <div><label>Akustik Refleks</label><textarea id="sim-refleks" rows="2" placeholder="Alındı / Alınamadı"></textarea></div>
                    <div><label>Konuşma Testleri</label><textarea id="sim-konusma" rows="2" placeholder="SDS / SRT skorları"></textarea></div>
                </div>

                <div style="margin-top:15px;">
                    <label style="color:var(--accent);">⚠️ Gereksiz/Yasak Testler (AI Puan Kıracak)</label>
                    <input type="text" id="sim-gereksiz" placeholder="Örn: İletim tipinde refleks bakılmaz...">
                </div>
            </div>

            <button id="btn-kaydet" onclick="islemYap()" class="admin-btn-save"><i class="fas fa-save"></i> Klasik Vaka Kaydet</button>
            <p id="sonuc" style="margin-top:15px; text-align:center; font-weight:600;"></p>
        </div>

        <div class="card">
            <h2 id="liste-baslik"><i class="fas fa-list"></i> Mevcut Vakalar</h2>
            <div id="yonetim-listesi"><p>Yükleniyor...</p></div>
        </div>

        <div class="card" style="border-left: 5px solid var(--accent);">
            <h2 style="margin-top:0; color:var(--text-main); margin-bottom: 20px;">
                <i class="fas fa-envelope-open-text" style="color:var(--accent);"></i> Geri Bildirimler
            </h2>
            <div id="feedback-listesi">
                <p>Mesajlar yükleniyor...</p>
            </div>
        </div>

    </div>

    <script>
        // GLOBAL DEĞİŞKENLER
        let aktifMod = 'klasik'; // 'klasik' veya 'simulasyon'
        let duzenlemeModu = false;
        let seciliId = null;

        // --- BİLDİRİM VE ONAY FONKSİYONLARI ---
        function showToast(mesaj, tip = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) { container = document.createElement('div'); container.id = 'toast-container'; document.body.appendChild(container); }
            const iconMap = { 'success': 'fa-check-circle', 'error': 'fa-times-circle', 'warning': 'fa-exclamation-triangle', 'info': 'fa-info-circle' };
            const toast = document.createElement('div'); toast.className = `toast toast-${tip}`;
            toast.innerHTML = `<i class="fas ${iconMap[tip] || 'fa-info-circle'}"></i><span>${mesaj}</span>`;
            container.appendChild(toast); setTimeout(() => toast.remove(), 3000);
        }

        function showConfirm(mesaj, callback) {
            const eski = document.querySelector('.confirm-overlay'); if(eski) eski.remove();
            const overlay = document.createElement('div'); overlay.className = 'confirm-overlay';
            overlay.innerHTML = `<div class="confirm-box"><i class="fas fa-question-circle" style="font-size:3rem; color:#f59e0b; margin-bottom:15px; display:block;"></i><h3 style="margin:0 0 10px 0; color:white;">Emin misiniz?</h3><p style="color:#94a3b8; margin:0;">${mesaj}</p><div class="confirm-buttons"><button class="btn-confirm-no" id="btn-iptal">Vazgeç</button><button class="btn-confirm-yes" id="btn-onayla">Evet, Yap</button></div></div>`;
            document.body.appendChild(overlay);
            document.getElementById('btn-iptal').onclick = () => overlay.remove();
            document.getElementById('btn-onayla').onclick = () => { overlay.remove(); callback(); };
        }

        document.addEventListener("DOMContentLoaded", function() {
            listele();
            feedbacksGetir();
        });

        // --- MOD DEĞİŞTİRME ---
        function modDegistir(mod) {
            aktifMod = mod;
            formuSifirla(); // Mod değişince formu temizle
            
            // Tab Stilleri
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Form Göster/Gizle
            document.getElementById('form-klasik').style.display = (mod === 'klasik') ? 'block' : 'none';
            document.getElementById('form-simulasyon').style.display = (mod === 'simulasyon') ? 'block' : 'none';

            // Buton Yazısı ve Liste Başlığı
            guncelleButonveBaslik();
            listele();
        }

        function guncelleButonveBaslik() {
            const btn = document.getElementById('btn-kaydet');
            const baslik = document.getElementById('liste-baslik');
            
            if (duzenlemeModu) {
                btn.innerHTML = `<i class="fas fa-sync-alt"></i> #${seciliId} Nolu Kaydı Güncelle`;
                btn.style.background = "var(--accent)";
            } else {
                if(aktifMod === 'klasik') {
                    btn.innerHTML = '<i class="fas fa-save"></i> Klasik Vaka Kaydet';
                    btn.style.background = '';
                    baslik.innerHTML = '<i class="fas fa-list"></i> Klasik Vakalar';
                } else {
                    btn.innerHTML = '<i class="fas fa-user-md"></i> Simülasyon Hastası Ekle';
                    btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                    baslik.innerHTML = '<i class="fas fa-users"></i> Simülasyon Hastaları';
                }
            }
        }

        // --- DÜZENLEME MODUNU AÇ ---
        async function duzenle(id) {
            showToast("Veriler getiriliyor...", "info");
            
            try {
                // Hangi moddaysak ona göre veri çek
                const url = (aktifMod === 'klasik') ? `/admin/case/${id}` : `/simulation/${id}`;
                const res = await fetch(url);
                const data = await res.json();

                if(data.success) {
                    const veri = data.vaka || data.sim; // Klasik için 'vaka', Simülasyon için 'sim' dönüyor
                    
                    // Ortak Alanları Doldur
                    document.getElementById('genel-baslik').value = veri.baslik;
                    document.getElementById('genel-yas').value = veri.yas;
                    document.getElementById('genel-cinsiyet').value = veri.cinsiyet;
                    document.getElementById('genel-zorluk').value = veri.zorluk || 'Orta';

                    if(aktifMod === 'klasik') {
                        document.getElementById('klasik-tani').value = veri.gizliTani;
                        document.getElementById('klasik-icerik').value = veri.icerik;
                    } else {
                        document.getElementById('sim-sikayet').value = veri.sikayet;
                        document.getElementById('sim-tani').value = veri.gercekTani;
                        document.getElementById('sim-anamnez').value = veri.anamnez;
                        document.getElementById('sim-otoskopi').value = veri.otoskopi;
                        document.getElementById('sim-safses').value = veri.safSes;
                        document.getElementById('sim-timpano').value = veri.timpanometri;
                        document.getElementById('sim-refleks').value = veri.refleks;
                        document.getElementById('sim-konusma').value = veri.konusma;
                        document.getElementById('sim-gereksiz').value = veri.gereksizTestler;
                    }

                    // Modu Güncelle
                    duzenlemeModu = true;
                    seciliId = id;
                    guncelleButonveBaslik();
                    
                    // İptal butonu ekle
                    if(!document.getElementById('btn-iptal-form')) {
                        const iptalBtn = document.createElement('button');
                        iptalBtn.id = 'btn-iptal-form';
                        iptalBtn.innerText = "İptal";
                        iptalBtn.style = "width:100%; margin-top:10px; background:#475569; color:white; padding:10px; border:none; border-radius:10px; cursor:pointer;";
                        iptalBtn.onclick = formuSifirla;
                        document.getElementById('btn-kaydet').parentNode.appendChild(iptalBtn);
                    }
                    
                    // Sayfayı yukarı kaydır
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            } catch(e) { showToast("Veri çekilemedi.", "error"); }
        }

        function formuSifirla() {
            duzenlemeModu = false;
            seciliId = null;
            
            // Tüm inputları temizle
            document.querySelectorAll('input, textarea').forEach(el => el.value = '');
            document.querySelectorAll('select').forEach(el => el.selectedIndex = 0);
            
            const iptalBtn = document.getElementById('btn-iptal-form');
            if(iptalBtn) iptalBtn.remove();
            
            guncelleButonveBaslik();
        }

        // --- KAYDET / GÜNCELLE ---
        async function islemYap() {
            const baslik = document.getElementById('genel-baslik').value;
            const yas = document.getElementById('genel-yas').value;
            const cinsiyet = document.getElementById('genel-cinsiyet').value;
            const zorluk = document.getElementById('genel-zorluk').value;

            if(!baslik || !yas) { showToast("Başlık ve yaş zorunludur.", "warning"); return; }
            
            const btn = document.getElementById('btn-kaydet');
            const orjText = btn.innerHTML;
            btn.innerHTML = "İşlem Yapılıyor...";
            btn.disabled = true;

            let url, method, bodyData, headers = {};

            // URL ve Metot Belirleme
            if(duzenlemeModu) {
                method = 'PUT';
                url = (aktifMod === 'klasik') ? `/admin/update-case/${seciliId}` : `/admin/update-simulation/${seciliId}`;
            } else {
                method = 'POST';
                url = (aktifMod === 'klasik') ? '/admin/add-case' : '/admin/add-simulation';
            }

            // Veri Hazırlama
            if (aktifMod === 'klasik') {
                const formData = new FormData();
                formData.append('baslik', baslik); formData.append('yas', yas);
                formData.append('cinsiyet', cinsiyet); formData.append('zorluk', zorluk);
                formData.append('gizliTani', document.getElementById('klasik-tani').value);
                formData.append('icerik', document.getElementById('klasik-icerik').value);
                const resim = document.getElementById('klasik-resim').files[0];
                if(resim) formData.append('vakaResmi', resim);
                
                bodyData = formData; // Klasikte FormData (Resim için)
            } else {
                headers = { 'Content-Type': 'application/json' };
                bodyData = JSON.stringify({
                    baslik, yas, cinsiyet, zorluk,
                    sikayet: document.getElementById('sim-sikayet').value,
                    gercekTani: document.getElementById('sim-tani').value,
                    anamnez: document.getElementById('sim-anamnez').value,
                    otoskopi: document.getElementById('sim-otoskopi').value,
                    safSes: document.getElementById('sim-safses').value,
                    timpanometri: document.getElementById('sim-timpano').value,
                    refleks: document.getElementById('sim-refleks').value,
                    konusma: document.getElementById('sim-konusma').value,
                    gereksizTestler: document.getElementById('sim-gereksiz').value
                });
            }

            try {
                const res = await fetch(url, { method: method, headers: headers, body: bodyData });
                const data = await res.json();
                
                if(data.success) {
                    showToast(data.message, "success");
                    formuSifirla();
                    listele();
                } else {
                    showToast(data.message, "error");
                }
            } catch(e) { showToast("Hata oluştu.", "error"); }
            
            btn.innerHTML = orjText;
            btn.disabled = false;
        }

        // --- LİSTELEME ---
        async function listele() {
            const kutu = document.getElementById('yonetim-listesi');
            kutu.innerHTML = "Yükleniyor...";
            const url = (aktifMod === 'klasik') ? '/cases' : '/simulations';
            
            try {
                const res = await fetch(url);
                const veriler = await res.json();
                kutu.innerHTML = "";

                if(veriler.length === 0) { kutu.innerHTML = "<p style='color:#aaa; padding:10px;'>Kayıt bulunamadı.</p>"; return; }

                veriler.reverse().forEach(v => {
                    const id = v.vakaNo || v.simNo;
                    kutu.innerHTML += `
                        <div class="admin-case-item">
                            <div><strong>#${id}</strong> ${v.baslik}</div>
                            <div style="display:flex; gap:10px;">
                                <button onclick="duzenle(${id})" style="background:var(--accent); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-weight:bold;">Düzenle</button>
                                <button onclick="sil(${id})" class="delete-btn" style="background:rgba(239,68,68,0.2); color:#ef4444; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Sil</button>
                            </div>
                        </div>
                    `;
                });
            } catch(e) { kutu.innerHTML = "Bağlantı hatası."; }
        }

        // --- SİLME ---
        async function sil(id) {
            showConfirm(`Kayıt #${id} silinecek. Emin misin?`, async () => {
                // Not: Simülasyon silme rotası server.js'de yoksa sadece klasik çalışır.
                // İdeal olan server.js'e delete-simulation rotasını da eklemektir.
                const url = (aktifMod === 'klasik') ? `/admin/delete-case/${id}` : `/admin/delete-case/${id}`; // GÜNCELLEME GEREKİR
                
                // NOT: Simülasyon silme için server.js'de ayrı bir rota yapmadıysak, geçici olarak aynı rotayı deniyor.
                // Eğer server.js'de '/admin/delete-simulation/:id' yoksa simülasyon silinemez.
                
                try {
                    const res = await fetch(url, { method: 'DELETE' });
                    const data = await res.json();
                    if(data.success) { showToast("Silindi.", "success"); listele(); }
                    else showToast("Silinemedi (Veya rota eksik).", "error");
                } catch(e) { showToast("Hata.", "error"); }
            });
        }

        // --- FEEDBACK YÖNETİMİ ---
        async function feedbacksGetir() {
            const div = document.getElementById('feedback-listesi');
            try {
                const res = await fetch('/admin/feedbacks');
                const msgs = await res.json();
                div.innerHTML = "";
                if(!msgs.length) { div.innerHTML = "<p style='color:#aaa; padding:10px;'>Mesaj yok.</p>"; return; }
                msgs.forEach(m => {
                    const tarih = new Date(m.tarih).toLocaleDateString('tr-TR');
                    const op = m.okundu ? '0.5' : '1';
                    div.innerHTML += `
                        <div style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:15px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; opacity:${op};">
                            <div>
                                <strong style="color:var(--primary);">${m.kullaniciAdi}</strong> <small style="color:#aaa;">${tarih}</small>
                                <div style="color:white; margin-top:5px;">${m.mesaj}</div>
                            </div>
                            <div>
                                <button onclick="durumDegistir('${m._id}')" style="background:transparent; border:none; cursor:pointer; color:var(--secondary); font-size:1.2rem; margin-right:10px;"><i class="fas fa-check-circle"></i></button>
                                <button onclick="feedbackSil('${m._id}')" style="background:transparent; border:none; cursor:pointer; color:var(--danger); font-size:1.2rem;"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                });
            } catch(e) {}
        }

        async function durumDegistir(id) { await fetch('/admin/toggle-feedback/'+id, {method:'PUT'}); feedbacksGetir(); }
        async function feedbackSil(id) {
            showConfirm("Mesaj silinsin mi?", async () => {
                await fetch('/admin/delete-feedback/'+id, {method:'DELETE'}); feedbacksGetir();
            });
        }
    </script>
</body>
</html>
